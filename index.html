<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Algorithms Comparison</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #f4f5a7;
    }

    h1 {
        margin: 20px;
    }

    input {
        padding: 10px;
        width: 320px;
        font-size: 16px;
    }

    button {
        padding: 10px 15px;
        margin: 15px;
        background: #34db45;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #2980b9;
    }

    table {
        margin: 30px auto;
        border-collapse: collapse;
        width: 70%;
    }

    th, td {
        padding: 12px;
        border: 1px solid #000000;
    }

    th {
        background: #3b3936;
        color: white;
    }

    #bestAlgo {
        margin-top: 25px;
        font-size: 22px;
        color: green;
    }
</style>
</head>

<body>

<h1>Sorting Comparison</h1>
<input type="text" id="arrayInput" placeholder="Enter Array">
<br>
<button onclick="compare()">Compare Algorithms</button>

<h3 id="arrayDisplay"></h3>
    
</body>
</html>
